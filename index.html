<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f4f8;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .resume-button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #4a90e2;
            color: white;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-decoration: none;
        }

        .resume-button:hover {
            background-color: #357ab8;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <h1>Choose Your Resume</h1>
    <div class="button-container">
        <a class="resume-button" href="CV_SK.pdf" target="_blank" lang="sk" aria-label="Open Slovak resume">
            Slovenský životopis
        </a>
        <a class="resume-button" href="CV_EN.pdf" target="_blank" aria-label="Open English resume">
            English resume
        </a>
    </div>
</body>

</html>
